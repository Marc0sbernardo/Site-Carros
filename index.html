<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>FP Selection</title>
</head>
<body>
    <header>
        <img src="Img/title.png" alt="logo fp">
        <nav>
            <ul>
                <li>Home</li>
                <li>Carros</li>
                <li>Fale Conosco</li>
            </ul>
        </nav>
    </header>

    <section>
         <div class="list">
                
            <div class="item">
              <div class="car-img">                        
                <img src="Img/Ferrari.png" alt="imagem carro">
                </div>
                    <div class="content">
                        <p class="car-information">
                            Único Dono
                        </p>
                        <h2>
                            Ferrari
                        </h2>
                        <p class="description">
                            Lorem ipsum dolor sit amet consectetur adipisicing elit. Sequi at cumque dolores eligendi consequuntur fugiat expedita, exercitationem tenetur nemo quae quidem facere minima omnis velit labore culpa ipsa eveniet deserunt.   
                        </p>
                        <button>
                            Saiba Mais
                        </button>
                    </div>
                </div>
         </div>
        

         <div class="arrows">
            <button><img src="Img/arrow.png" alt="seta esquerda"></button>
            <button><img src="Img/arrow.png" alt="seta direita"></button>
         </div>

         <div class="idnicators">
            <div class="number">01</div>
            <ul>
                <li class="active"></li>
                <li></li>
                <li></li>
            </ul>
         </div>
    </section>
</body>
</html>
